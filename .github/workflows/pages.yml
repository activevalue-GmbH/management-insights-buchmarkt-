name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply public Pages adjustments
        shell: python
        run: |
          from pathlib import Path
          import base64

          logo_b64 = """
          
          """
          public = Path("client/public")
          public.mkdir(parents=True, exist_ok=True)
          (public / "active-value-logo.png").write_bytes(base64.b64decode("".join(logo_b64.split())))

          index_path = Path("client/index.html")
          index = index_path.read_text()
          index = index.replace('/manus-storage/buchmarkt-social-cover_7af2e27a.png', '%BASE_URL%active-value-logo.png')
          index = index.replace('/manus-storage/active-value-logo_ff5e185c.png', '%BASE_URL%active-value-logo.png')
          index_path.write_text(index)

          home_path = Path("client/src/pages/Home.tsx")
          home = home_path.read_text()
          home = home.replace('const LOGO_URL = "/manus-storage/active-value-logo_ff5e185c.png";\nconst HERO_IMAGE_URL = "/manus-storage/buchmarkt-signalstoerung-hero_91a7c97e.png";\nconst ATTENTION_IMAGE_URL = "/manus-storage/buchmarkt-signalstoerung-nutzung_abe785b3.png";', 'const LOGO_URL = `${import.meta.env.BASE_URL}active-value-logo.png`;')
          home = home.replace('''              <img
                src={HERO_IMAGE_URL}
                alt="Ein Buch bleibt hinter analogem TV-Graurauschen und gestörten Signallinien sichtbar."
                fetchPriority="high"
              />''', '''              <div
                className="signal-scene signal-scene--hero"
                role="img"
                aria-label="Ein Buch bleibt hinter analogem TV-Graurauschen und gestörten Signallinien sichtbar."
              />''')
          home = home.replace('''              <img
                src={ATTENTION_IMAGE_URL}
                alt="Ein aufgeschlagenes Buch wird von analogem TV-Rauschen und einem unterbrochenen Signal überlagert."
                loading="lazy"
              />''', '''              <div
                className="signal-scene signal-scene--stat"
                role="img"
                aria-label="Ein aufgeschlagenes Buch wird von analogem TV-Rauschen und einem unterbrochenen Signal überlagert."
              />''')
          home_path.write_text(home)

          css_path = Path("client/src/index.css")
          css = css_path.read_text()
          css = css.replace('''.brand img {
  width: 12.25rem;
  height: 4.25rem;
  object-fit: contain;
  object-position: left center;
}''', '''.brand img {
  display: block;
  width: clamp(7.75rem, 13vw, 9rem);
  height: auto;
}''')
          signal_css = '''.signal-scene {
  position: relative;
  width: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 58% 38%, rgba(255, 255, 255, 0.2), transparent 18%),
    linear-gradient(135deg, rgba(155, 198, 63, 0.58), transparent 29%),
    repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.05) 0 2px, transparent 2px 5px),
    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0 3px, transparent 3px 8px),
    linear-gradient(145deg, #08281e 0%, #123c2d 52%, #030f0c 100%);
}

.signal-scene::before {
  position: absolute;
  right: 15%;
  bottom: 22%;
  width: 48%;
  height: 28%;
  content: "";
  border-radius: 0.45rem 1.2rem 1.2rem 0.45rem;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.24)),
    repeating-linear-gradient(90deg, transparent 0 11%, rgba(8, 40, 30, 0.22) 11% 12%);
  box-shadow:
    -2rem -1.5rem 0 rgba(255, 255, 255, 0.16),
    0 2.25rem 4rem rgba(0, 0, 0, 0.34);
  transform: perspective(24rem) rotateX(58deg) rotateZ(-10deg);
}

.signal-scene::after {
  position: absolute;
  inset: 0;
  content: "";
  background:
    linear-gradient(100deg, transparent 0 42%, rgba(155, 198, 63, 0.32) 43% 45%, transparent 47%),
    repeating-linear-gradient(175deg, transparent 0 26px, rgba(255, 255, 255, 0.13) 27px 29px);
  mix-blend-mode: screen;
}

.signal-scene--hero {
  width: 100%;
  min-height: 34rem;
  aspect-ratio: 4 / 5;
  box-shadow: var(--shadow);
}'''
          css = css.replace('''.hero-visual img {
  width: 100%;
  min-height: 34rem;
  aspect-ratio: 4 / 5;
  object-fit: cover;
  box-shadow: var(--shadow);
}''', signal_css)
          css = css.replace('''.stat-visual img {
  width: 100%;
  aspect-ratio: 4 / 5;
  object-fit: cover;
  filter: saturate(0.85) contrast(1.03);
}''', '''.signal-scene--stat {
  width: 100%;
  aspect-ratio: 4 / 5;
  filter: saturate(0.85) contrast(1.03);
}''')
          css = css.replace('''.footer-brand img {
  width: 11.5rem;
  height: 3.8rem;
  padding: 0.25rem;
  object-fit: contain;
  object-position: left center;
  background: white;
}''', '''.footer-brand img {
  display: block;
  width: 9rem;
  height: auto;
  background: white;
}''')
          css = css.replace('''.hero-visual img {
    min-height: auto;
    aspect-ratio: 16 / 10;
  }''', '''.signal-scene--hero {
    min-height: auto;
    aspect-ratio: 16 / 10;
  }''')
          css = css.replace('''.brand img {
    width: 10.5rem;
    height: 3.4rem;
  }''', '''.brand img {
    width: 7.75rem;
  }''')
          css = css.replace('''.stat-visual img {
    aspect-ratio: 16 / 11;
  }''', '''.signal-scene--stat {
    aspect-ratio: 16 / 11;
  }''')
          css = css.replace('''.hero-visual img {
    aspect-ratio: 4 / 5;
  }''', '''.signal-scene--hero {
    aspect-ratio: 4 / 5;
  }''')
          css = css.replace('''.footer-brand img {
    width: 10.5rem;
  }''', '''.footer-brand img {
    width: 8rem;
  }''')
          css_path.write_text(css)

          vite_path = Path("vite.config.ts")
          vite = vite_path.read_text()
          vite = vite.replace('export default defineConfig({\n  plugins,', 'export default defineConfig({\n  base: "./",\n  plugins,')
          vite_path.write_text(vite)
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public
      - uses: actions/deploy-pages@v4
